<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo - javascript</title>
    <style>
:root {
  --bg-color: #f4f6f9;
  --card-bg: #ffffff;
  --text-color: #333333;
  --primary-color: #4f46e5;
  --border-color: #e5e7eb;
}

[data-theme="dark"] {
  --bg-color: #111827;
  --card-bg: #1f2937;
  --text-color: #f9fafb;
  --border-color: #374151;
}

body {
  background-color: var(--bg-color);
  color: var(--text-color);
  font-family: system-ui, sans-serif;
  transition: background 0.3s;
  display: flex;
  justify-content: center;
  padding-top: 50px;
}

.todo-container {
  background: var(--card-bg);
  width: 100%;
  max-width: 450px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

#todo-form {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

#todo-input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: transparent;
  color: var(--text-color);
}

.filter-tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

.tab-btn {
  background: none;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  color: #9ca3af;
}

.tab-btn.active {
  color: var(--primary-color);
  font-weight: bold;
}

.todo-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
}

.todo-item.completed span {
  text-decoration: line-through;
  color: #9ca3af;
}

/* 드래그 요소 스타일 */
.todo-item {
  cursor: grab; /* 잡을 수 있는 손모양 커서 */
  transition: transform 0.2s, background-color 0.2s;
}

.todo-item:active {
  cursor: grabbing; /* 잡았을 때 커서 */
}

/* 드래그 중인 타겟 아이템 투명도 조절 */
.todo-item.dragging {
  opacity: 0.5;
  background-color: var(--border-color);
}

/* 드래그 위로 지나갈 때 시각적 효과 (선택사항) */
.todo-item.drop-over {
  border-top: 2px solid var(--primary-color);
}
    </style>
</head>
<body>

<div class="todo-container">
    <!-- 헤더 & 테마 토글 -->
    <header>
      <h1>Task Manager</h1>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </header>

    <!-- 입력 폼 -->
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." required autocomplete="off">
      <button type="submit">추가</button>
    </form>

    <!-- 필터 탭 -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all">전체</button>
      <button class="tab-btn" data-filter="active">진행 중</button>
      <button class="tab-btn" data-filter="completed">완료</button>
    </div>

    <!-- 리스트 영역 -->
    <ul id="todo-list">
      <!-- JS로 동적 생성될 영역 -->
    </ul>

    <!-- 푸터 상태 바 -->
    <footer>
      <span id="todo-count">남은 할 일: 0개</span>
    </footer>
  </div>
    
<script>
// 1. 상태 변수 정의 (var 사용)
localStorage.removeItem('todos');
var todos = [];
todos = JSON.parse(localStorage.getItem('todos')) || [];
var currentFilter = 'all';
var draggedItem = null;

// 2. DOM 요소 선택
var todoForm = document.getElementById('todo-form');
var todoInput = document.getElementById('todo-input');
var todoList = document.getElementById('todo-list');
var todoCount = document.getElementById('todo-count');
var filterBtns = document.querySelectorAll('.tab-btn');
var themeToggle = document.getElementById('theme-toggle');

// 3. 이벤트 리스너 등록 (익명 함수 형태 사용)
todoForm.addEventListener('submit', function(e) {
  e.preventDefault();
  var text = todoInput.value.trim();
  if (text) {
    addTodo(text);
    todoInput.value = '';
  }
});

// NodeList 반복을 위해 전통적인 for 루프 사용 (ES5 안전성 보장)
for (var i = 0; i < filterBtns.length; i++) {
  filterBtns[i].addEventListener('click', function(e) {
    for (var j = 0; j < filterBtns.length; j++) {
      filterBtns[j].classList.remove('active');
    }
    e.target.classList.add('active');
    currentFilter = e.target.getAttribute('data-filter'); // dataset 대신 getAttribute 사용
    render();
  });
}

themeToggle.addEventListener('click', function() {
  var currentTheme = document.body.getAttribute('data-theme');
  var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', newTheme);
  themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
});

// 4. 핵심 비즈니스 로직 함수
function addTodo(text) {
  var todo = { 
    id: Date.now(), 
    text: text, 
    completed: false 
  };
  todos.push(todo);
  saveAndRender();
}

function toggleTodo(id) {
  // ES6 구조 분해 할당 대신 전통적인 객체 속성 수정 방식 사용
  todos = todos.map(function(todo) {
    if (todo.id === id) {
      todo.completed = !todo.completed;
    }
    return todo;
  });
  saveAndRender();
}

function deleteTodo(id) {
  todos = todos.filter(function(todo) {
    return todo.id !== id;
  });
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('todos', JSON.stringify(todos));
  render();
}

// 5. 드래그 앤 드롭 이벤트 바인딩 함수
function addDragEvents(item) {
  item.addEventListener('dragstart', function(e) {
    draggedItem = item;
    setTimeout(function() {
      item.classList.add('dragging');
    }, 0);
  });

  item.addEventListener('dragend', function() {
    draggedItem.classList.remove('dragging');
    draggedItem = null;
    reorderTodos();
  });

  item.addEventListener('dragover', function(e) {
    e.preventDefault();
    var bounding = item.getBoundingClientRect();
    var offset = e.clientY - bounding.top - bounding.height / 2;
    
    if (offset > 0) {
      item.parentNode.insertBefore(draggedItem, item.nextSibling); // after() 대신 insertBefore 활용
    } else {
      item.parentNode.insertBefore(draggedItem, item); // before() 대신 insertBefore 활용
    }
  });
}

// 6. 데이터 순서 동기화 함수
function reorderTodos() {
  var renderedElements = todoList.querySelectorAll('.todo-item');
  var currentRenderedIds = [];
  
  // Array.from() 대신 전통적인 루프로 NodeList에서 ID 추출
  for (var k = 0; k < renderedElements.length; k++) {
    currentRenderedIds.push(Number(renderedElements[k].getAttribute('data-id')));
  }
  
  var reordered = [];
  
  // 1. 화면 순서대로 배치
  currentRenderedIds.forEach(function(id) {
    // Array.prototype.find 대신 ES5 표준인 filter를 활용해 객체 탐색
    var found = todos.filter(function(t) { return t.id === id; });
    if (found.length > 0) {
      reordered.push(found[0]);
    }
  });
  
  // 2. 화면에 없는 요소(필터링된 항목) 유실 방지
  todos.forEach(function(todo) {
    if (currentRenderedIds.indexOf(todo.id) === -1) { // includes() 대신 indexOf() === -1 사용
      reordered.push(todo);
    }
  });

  todos = reordered;
  localStorage.setItem('todos', JSON.stringify(todos));
}

// 7. 렌더링 함수
function render() {
  todoList.innerHTML = '';
  
  var filteredTodos = todos.filter(function(todo) {
    if (currentFilter === 'active') return !todo.completed;
    if (currentFilter === 'completed') return todo.completed;
    return true;
  });

  filteredTodos.forEach(function(todo, index) {
    var li = document.createElement('li');
    li.className = 'todo-item' + (todo.completed ? ' completed' : '');
    li.setAttribute('draggable', 'true');
    li.setAttribute('data-id', todo.id);
    li.setAttribute('data-index', index);
    
    // 템플릿 리터럴(``) 대신 일반 문자열 결합 사용
    li.innerHTML = 
      '<label style="display:flex; align-items:center; gap:10px; cursor:pointer;">' +
        '<input type="checkbox" ' + (todo.completed ? 'checked' : '') + '>' +
        '<span>' + todo.text + '</span>' +
      '</label>' +
      '<button class="delete-btn" style="background:none; border:none; cursor:pointer; color:#ef4444;">삭제</button>';

    // 클로저 문제를 방지하기 위해 각 엘리먼트 내부에서 즉시 이벤트 바인딩
    li.querySelector('input').addEventListener('change', function() {
      toggleTodo(todo.id);
    });
    
    li.querySelector('.delete-btn').addEventListener('click', function() {
      deleteTodo(todo.id);
    });

    addDragEvents(li);
    todoList.appendChild(li);
  });

  var activeCount = todos.filter(function(todo) {
    return !todo.completed;
  }).length;
  
  todoCount.textContent = '남은 할 일: ' + activeCount + '개';
}

// 초기 실행
render();
</script>
</body>
</html>
