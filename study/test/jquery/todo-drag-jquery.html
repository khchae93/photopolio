<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo - javascript</title>
    <style>
:root {
  --bg-color: #f4f6f9;
  --card-bg: #ffffff;
  --text-color: #333333;
  --primary-color: #4f46e5;
  --border-color: #e5e7eb;
}

[data-theme="dark"] {
  --bg-color: #111827;
  --card-bg: #1f2937;
  --text-color: #f9fafb;
  --border-color: #374151;
}

body {
  background-color: var(--bg-color);
  color: var(--text-color);
  font-family: system-ui, sans-serif;
  transition: background 0.3s;
  display: flex;
  justify-content: center;
  padding-top: 50px;
}

.todo-container {
  background: var(--card-bg);
  width: 100%;
  max-width: 450px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

#todo-form {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

#todo-input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: transparent;
  color: var(--text-color);
}

.filter-tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

.tab-btn {
  background: none;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  color: #9ca3af;
}

.tab-btn.active {
  color: var(--primary-color);
  font-weight: bold;
}

.todo-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
}

.todo-item.completed span {
  text-decoration: line-through;
  color: #9ca3af;
}

/* 드래그 요소 스타일 */
.todo-item {
  cursor: grab; /* 잡을 수 있는 손모양 커서 */
  transition: transform 0.2s, background-color 0.2s;
}

.todo-item:active {
  cursor: grabbing; /* 잡았을 때 커서 */
}

/* 드래그 중인 타겟 아이템 투명도 조절 */
.todo-item.dragging {
  opacity: 0.5;
  background-color: var(--border-color);
}

/* 드래그 위로 지나갈 때 시각적 효과 (선택사항) */
.todo-item.drop-over {
  border-top: 2px solid var(--primary-color);
}
    </style>
</head>
<body>

<div class="todo-container">
    <!-- 헤더 & 테마 토글 -->
    <header>
      <h1>Task Manager</h1>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </header>

    <!-- 입력 폼 -->
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." required autocomplete="off">
      <button type="submit">추가</button>
    </form>

    <!-- 필터 탭 -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all">전체</button>
      <button class="tab-btn" data-filter="active">진행 중</button>
      <button class="tab-btn" data-filter="completed">완료</button>
    </div>

    <!-- 리스트 영역 -->
    <ul id="todo-list">
      <!-- JS로 동적 생성될 영역 -->
    </ul>

    <!-- 푸터 상태 바 -->
    <footer>
      <span id="todo-count">남은 할 일: 0개</span>
    </footer>
  </div>
    

  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script>
// Document Ready 공통 스코프
$(document).ready(function() {
  
  // 1. 상태 변수 정의
  localStorage.removeItem('todos');
  var todos = [];
  todos = JSON.parse(localStorage.getItem('todos')) || [];
  var currentFilter = 'all';
  var draggedItem = null;

  // 2. 캐싱할 jQuery 객체 선택
  var $todoForm = $('#todo-form');
  var $todoInput = $('#todo-input');
  var $todoList = $('#todo-list');
  var $todoCount = $('#todo-count');
  var $themeToggle = $('#theme-toggle');

  // 3. 이벤트 리스너 등록
  $todoForm.on('submit', function(e) {
    e.preventDefault();
    var text = $.trim($todoInput.val());
    if (text) {
      addTodo(text);
      $todoInput.val('');
    }
  });

  // 필터 탭 클릭 (이벤트 위임 방식 활용)
  $('.filter-tabs').on('click', '.tab-btn', function() {
    $('.tab-btn').removeClass('active');
    $(this).addClass('active');
    currentFilter = $(this).data('filter');
    render();
  });

  // 다크모드 토글
  $themeToggle.on('click', function() {
    var $body = $('body');
    var isDark = $body.attr('data-theme') === 'dark';
    var newTheme = isDark ? 'light' : 'dark';
    
    $body.attr('data-theme', newTheme);
    $themeToggle.text(newTheme === 'dark' ? '☀️' : '🌙');
  });

  // [중요] 동적으로 생성되는 리스트 아이템의 이벤트 위임 처리
  $todoList.on('change', '.todo-item input[type="checkbox"]', function() {
    var id = $(this).closest('.todo-item').data('id');
    toggleTodo(id);
  });

  $todoList.on('click', '.delete-btn', function() {
    var id = $(this).closest('.todo-item').data('id');
    // jQuery의 부드러운 애니메이션 효과 가미 후 삭제
    $(this).closest('.todo-item').fadeOut(300, function() {
      deleteTodo(id);
    });
  });

  // 4. 핵심 비즈니스 로직 함수
  function addTodo(text) {
    var todo = { id: Date.now(), text: text, completed: false };
    todos.push(todo);
    saveAndRender();
  }

  function toggleTodo(id) {
    todos = $.map(todos, function(todo) {
      if (todo.id === id) {
        todo.completed = !todo.completed;
      }
      return todo;
    });
    saveAndRender();
  }

  function deleteTodo(id) {
    todos = $.grep(todos, function(todo) {
      return todo.id !== id;
    });
    saveAndRender();
  }

  function saveAndRender() {
    localStorage.setItem('todos', JSON.stringify(todos));
    render();
  }

  // 5. 드래그 앤 드롭 이벤트 바인딩 (jQuery 내에서 Vanilla HTML5 API 활용)
  function addDragEvents($item) {
    var item = $item[0]; // jQuery 객체에서 순수 DOM 엘리먼트 추출

    item.addEventListener('dragstart', function() {
      draggedItem = this;
      var $self = $(this);
      setTimeout(function() {
        $self.addClass('dragging');
      }, 0);
    });

    item.addEventListener('dragend', function() {
      $(this).removeClass('dragging');
      draggedItem = null;
      reorderTodos();
    });

    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      var bounding = this.getBoundingClientRect();
      var offset = e.clientY - bounding.top - bounding.height / 2;
      
      if (offset > 0) {
        $(this).after(draggedItem);
      } else {
        $(this).before(draggedItem);
      }
    });
  }

  // 6. 데이터 순서 동기화 함수
  function reorderTodos() {
    var currentRenderedIds = [];
    
    // jQuery .each()를 활용한 ID 추출
    $todoList.find('.todo-item').each(function() {
      currentRenderedIds.push($(this).data('id'));
    });
    
    var reordered = [];
    
    // 1. 화면 순서대로 배치
    $.each(currentRenderedIds, function(index, id) {
      var found = $.grep(todos, function(t) { return t.id === id; });
      if (found.length > 0) {
        reordered.push(found[0]);
      }
    });
    
    // 2. 화면에 없는 요소 유실 방지
    $.each(todos, function(index, todo) {
      if ($.inArray(todo.id, currentRenderedIds) === -1) {
        reordered.push(todo);
      }
    });

    todos = reordered;
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  // 7. 렌더링 함수
  function render() {
    $todoList.empty(); // 기존 리스트 비우기
    
    var filteredTodos = $.grep(todos, function(todo) {
      if (currentFilter === 'active') return !todo.completed;
      if (currentFilter === 'completed') return todo.completed;
      return true;
    });

    $.each(filteredTodos, function(index, todo) {
      // jQuery 체이닝을 활용한 동적 Element 생성 및 속성 부여
      var $li = $('<li>')
        .addClass('todo-item')
        .toggleClass('completed', todo.completed)
        .attr('draggable', 'true')
        .data('id', todo.id); // jQuery 내부 데이터 저장소 활용
        
      var htmlContent = 
        '<label style="display:flex; align-items:center; gap:10px; cursor:pointer;">' +
          '<input type="checkbox" ' + (todo.completed ? 'checked' : '') + '>' +
          '<span>' + todo.text + '</span>' +
        '</label>' +
        '<button class="delete-btn" style="background:none; border:none; cursor:pointer; color:#ef4444;">삭제</button>';

      $li.html(htmlContent);
      addDragEvents($li);
      $todoList.append($li);
    });

    var activeCount = $.grep(todos, function(todo) {
      return !todo.completed;
    }).length;
    
    $todoCount.text('남은 할 일: ' + activeCount + '개');
  }

  // 초기 실행
  render();
});
</script>
</body>
</html>
