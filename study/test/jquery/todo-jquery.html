<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo - javascript</title>
    <style>
:root {
  --bg-color: #f4f6f9;
  --card-bg: #ffffff;
  --text-color: #333333;
  --text-color2: #f9fafb;
  --primary-color: #4f46e5;
  --border-color: #e5e7eb;
}

[data-theme="dark"] {
  --bg-color: #111827;
  --card-bg: #1f2937;
  --text-color: #f9fafb;
  --text-color2: #333333;
  --border-color: #374151;
}

*{margin:0;padding:0;-webkit-text-size-adjust:none; box-sizing:border-box; word-break:normal; word-wrap:break-word;}
*, *:after, *:before {-webkit-box-sizing:border-box; box-sizing:border-box; word-break:normal; word-wrap:break-word;}

body {background-color: var(--bg-color);color: var(--text-color);font-family: system-ui, sans-serif;transition: background 0.3s;display: flex;justify-content: center;padding-top: 50px;}

#wrap {background: var(--card-bg);width: 100%;max-width: 450px;padding: 25px;border-radius: 12px;box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);}

header {display: flex;justify-content: space-between;align-items: center;margin-bottom: 20px;}
header h1 {font-size:28px;line-height:36px;}

.theme_btn {display:inline-block;width:60px;height:32px;border:1px solid var(--text-color);background:var(--text-color);border-radius:2px;color:var(--text-color2);font-size:14px;line-height:29px;}

.todo_form_inner {display: flex;gap:10px;margin:30px 0 15px;}
#todo_input {flex: 1;padding: 10px;border: 1px solid var(--border-color);border-radius: 6px;background: transparent;color: var(--text-color);}
.todo_form_inner button {width:80px;border:1px solid var(--border-color);background: var(--bg-color);color:var(--text-color);}

.filter_tabs {display: flex;gap: 5px;margin-bottom: 15px;}

.tab_btn {background: none;border: none;padding: 5px 10px;cursor: pointer;color: #9ca3af;}
.tab_btn.active {color: var(--primary-color);font-weight: bold;}

.todo_item {display: flex;align-items: center;justify-content: space-between;padding: 10px 0;border-bottom: 1px solid var(--border-color);}
.todo_item.completed span {text-decoration: line-through;color: #9ca3af;}

footer {margin-top:40px;}
    </style>
</head>
<body>

<div id="wrap">
    <!-- 헤더 & 테마 토글 -->
    <header>
      <h1>TO DO List</h1>
      <button id="theme_toggle" class="theme_btn">다크</button>
    </header>

    <!-- 입력 폼 -->
    <form id="todo_form">
      <div class="todo_form_inner">
        <input type="text" id="todo_input" placeholder="입력하세요" required autocomplete="off">
        <button type="submit">추가</button>
      </div>
    </form>

    <!-- 필터 탭 -->
    <div class="filter_tabs">
      <button class="tab_btn active" data-filter="all">전체</button>
      <button class="tab_btn" data-filter="active">진행 중</button>
      <button class="tab_btn" data-filter="completed">완료</button>
    </div>

    <!-- 리스트 영역 -->
    <ul id="todo-list">
      <!-- JS로 동적 생성될 영역 -->
    </ul>

    <!-- 푸터 상태 바 -->
    <footer>
      <span id="todo-count">남은 할 일: 0개</span>
    </footer>
  </div>
    
<script>
$(document).ready(function() {
  
  localStorage.removeItem('todos');
  var todos = [];
  todos = JSON.parse(localStorage.getItem('todos')) || [];
  var currentFilter = 'all';
  var draggedItem = null;

  var $todoForm = $('#todo_form');
  var $todoInput = $('#todo_input');
  var $todoList = $('#todo-list');
  var $todoCount = $('#todo-count');
  var $themeToggle = $('#theme_toggle');

  // 추가버튼
  $todoForm.on('submit', function(e) {
    e.preventDefault();
    var text = $.trim($todoInput.val());
    if (text) {
      addTodo(text);
      $todoInput.val('');
    }
  });

  //필터
  $('.filter_tabs').on('click', '.tab_btn', function() {
    $('.tab_btn').removeClass('active');
    $(this).addClass('active');
    currentFilter = $(this).data('filter');
    init();
  });

  // 라이트/다크 모드
  $themeToggle.on('click', function() {
    var $body = $('body');
    var isDark = $body.attr('data-theme') === 'dark';
    var newTheme = isDark ? 'light' : 'dark';
    
    $body.attr('data-theme', newTheme);
    $themeToggle.text(newTheme === 'dark' ? '라이트' : '다크');
  });

  $todoList.on('change', '.todo_item input[type="checkbox"]', function() {
    var id = $(this).closest('.todo_item').data('id');
    toggleTodo(id);
  });

  $todoList.on('click', '.delete-btn', function() {
    var id = $(this).closest('.todo_item').data('id');
    $(this).closest('.todo_item').fadeOut(300, function() {
      deleteTodo(id);
    });
  });

  function addTodo(text) {
    var todo = { id: Date.now(), text: text, completed: false };
    todos.push(todo);
    saveAndRender();
  }

  function toggleTodo(id) {
    todos = $.map(todos, function(todo) {
      if (todo.id === id) {
        todo.completed = !todo.completed;
      }
      return todo;
    });
    saveAndRender();
  }

  function deleteTodo(id) {
    todos = $.grep(todos, function(todo) {
      return todo.id !== id;
    });
    saveAndRender();
  }

  function saveAndRender() {
    localStorage.setItem('todos', JSON.stringify(todos));
    init();
  }

  function init() {
    $todoList.empty(); // 기존 리스트 비우기
    
    var filteredTodos = $.grep(todos, function(todo) {
      if (currentFilter === 'active') return !todo.completed;
      if (currentFilter === 'completed') return todo.completed;
      return true;
    });

    $.each(filteredTodos, function(index, todo) {
      var $li = $('<li>')
        .addClass('todo_item')
        .toggleClass('completed', todo.completed);
        
      var htmlContent = 
        '<label style="display:flex; align-items:center; gap:10px; cursor:pointer;">' +
          '<input type="checkbox" ' + (todo.completed ? 'checked' : '') + '>' +
          '<span>' + todo.text + '</span>' +
        '</label>' +
        '<button class="delete-btn" style="background:none; border:none; cursor:pointer; color:#ef4444;">삭제</button>';

      $li.html(htmlContent);
      $todoList.append($li);
    });

    var activeCount = $.grep(todos, function(todo) {
      return !todo.completed;
    }).length;
    
    $todoCount.text('남은 할 일: ' + activeCount + '개');
  }

  // 초기 실행
  init();
});
</script>
</body>
</html>
